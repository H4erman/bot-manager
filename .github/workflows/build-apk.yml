name: Build BotManager APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04    # 24.04 часто вызывает больше проблем → пока 22.04 надёжнее
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential ccache libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
            libsqlite3-dev libreadline-dev libbz2-dev lzma \
            liblzma-dev tk-dev libxml2-dev libxslt1-dev \
            openjdk-17-jdk unzip git wget autoconf libtool \
            pkg-config automake gettext autopoint

      - name: Install Buildozer & specific Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install "Cython==0.29.37" virtualenv
          pip install buildozer

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          yes | sdkmanager --update >/dev/null || true

      - name: Build APK with Buildozer
        working-directory: ./android
        run: |
          export BUILDOZER_WARN_ON_ROOT=0
          buildozer android clean    # важно при изменении зависимостей / spec
          buildozer -v android debug

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bot-manager-apk
          path: android/bin/*.apk
          retention-days: 7
